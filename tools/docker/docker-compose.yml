services:
  nginx:
    build:
      context: ../../tools/nginx/staging
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      whisper:
        condition: service_started
    restart: unless-stopped
    networks:
      - project-network

  frontend:
    build:
      context: ../../typescript
      dockerfile: frontend/Dockerfile.frontend
      args:
        - NODE_ENV=${NODE_ENV:-development}
        - DEVELOPMENT_MODE=${DEVELOPMENT_MODE:-standard}
    ports:
      - "3000:3000"
    depends_on:
      zlim:
        condition: service_started
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DEVELOPMENT_MODE=${DEVELOPMENT_MODE:-standard}
    env_file:
      - ../../typescript/frontend/.env.${NODE_ENV:-development}
    networks:
      - project-network

  backend:
    build:
      context: ../../typescript
      dockerfile: backend/Dockerfile.sync
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DEVELOPMENT_MODE=${DEVELOPMENT_MODE:-standard}
    env_file:
      - ../../typescript/backend/.env.${NODE_ENV:-development}
    restart: unless-stopped
    networks:
      - project-network

  whisper:
    build:
      context: ../../python
      dockerfile: whisper/Dockerfile.whisper
    ports:
      - "5001:5001"
    networks:
      - project-network

volumes:
  shared-logs:

networks:
  project-network:
    driver: bridge
